format = """
$directory\
$git_branch\
$git_status\
$python\
$lua\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[directory]
style = 'bold fg:dark_blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = 'ÔÇª/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '

[git_branch]
style = 'fg:green'
symbol = '´Éÿ '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:red'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'fg:green'
symbol = '¯êÁ '
format = ' [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
format = '[$symbol($version )]($style)'
symbol = '¯ÿá '

[package]
symbol = '¾░Åù '

[docker_context]
symbol = '´îê '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = '´Çô '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

[conda]
format = '[$symbol$environment](dimmed green) '
symbol = '­ƒàÆ '

[palettes.github_dark]
dark_blue='#58a6ff'
blue='#79c0ff'
red='#ff7b72'
green='#3fb950'
purple='#bc8cff'
cyan='#39c5cf'
orange='#ffa657'
yellow='#d29922'
gray='#8b949e'
white='#c9d1d9'
black='#0d1117'
