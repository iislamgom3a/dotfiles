
# Enable 256-color and true-color (24-bit) support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# General
set -g set-clipboard on          # Use system clipboard
set -g detach-on-destroy off     # Don't exit from tmux when closing a session
set -g escape-time 0             # Zero-out escape time delay
set -g history-limit 1000000     # Increase history size
set -g mouse on                  # Enable mouse support
set -g status-interval 3         # Update status every 3 seconds
set -g allow-passthrough on      # Allow programs to bypass tmux (image previews)
set -g status-position top       # Status bar at the top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on       # Renumber windows when one is closed

# -----------------------------------------------------------------------------
# KEY BINDINGS
# -----------------------------------------------------------------------------

# Set prefix key to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload tmux config (points to your specific location)
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Split panes using \ and - (current path)
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane resizing
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z     # Maximize pane


# Enable vi mode
set-window-option -g mode-keys vi
# Start selecting text with "v" bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy with "y" using wl-copy (Standard for Fedora Wayland)
# If you are using X11, replace 'wl-copy' with 'xclip -in -selection clipboard'
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "wl-copy"

# Paste with Prefix + P
bind P paste-buffer

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# -----------------------------------------------------------------------------
# THEME: Nord (Rounded)
# -----------------------------------------------------------------------------

# Nord Colors
# Bg: #2e3440, Fg: #d8dee9, Blue: #81a1c1, Cyan: #88c0d0, Green: #a3be8c, Gray: #4c566a

set -g status-style "fg=#d8dee9,bg=#2e3440"
set -g message-style "fg=#2e3440,bg=#81a1c1"
set -g mode-style "fg=#2e3440,bg=#81a1c1"

# Borders
set -g pane-border-style "fg=#4c566a"
set -g pane-active-border-style "fg=#88c0d0"

# Status Left (Session Name with rounded pill)
set -g status-left-length 100
set -g status-left "#[fg=#81a1c1,bg=#2e3440,bold]#[fg=#2e3440,bg=#81a1c1] #S#[fg=#81a1c1,bg=#2e3440,nobold] "
set -g status-right "#[fg=#a3be8c,bg=#2e3440]#[fg=#2e3440,bg=#a3be8c] #{cpu_percentage}#[fg=#a3be8c,bg=#2e3440] #[fg=#81a1c1,bg=#2e3440]#[fg=#2e3440,bg=#81a1c1] #{ram_percentage}#[fg=#81a1c1,bg=#2e3440] #[fg=#88c0d0,bg=#2e3440]#[fg=#2e3440,bg=#88c0d0] %d-%m-%Y#[fg=#88c0d0,bg=#2e3440] #[fg=#d8dee9,bg=#2e3440]#[fg=#2e3440,bg=#d8dee9] %I:%M#[fg=#d8dee9,bg=#2e3440] #[fg=#4c566a,bg=#2e3440]"

# Window Status
set -g window-status-current-format "#[fg=#81a1c1,bg=#2e3440]#[fg=#2e3440,bg=#81a1c1,bold]#I:#W#[fg=#81a1c1,bg=#2e3440,nobold]"

# -----------------------------------------------------------------------------
# PLUGINS
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu' 

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
