set -g default-terminal "xterm-256color"
set -ga terminal-overrides ',xterm-256color:Tc'
set -g xterm-keys on

# General
set -g set-clipboard on
set -g detach-on-destroy off     # Don't exit from tmux when closing a session
set -g escape-time 0             # Zero-out escape time delay
set -g history-limit 1000000
set -g mouse on
set -g status-interval 3         # Update status every 3 seconds
set -g allow-passthrough on
set -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on       # Renumber windows when one is closed

# -----------------------------------------------------------------------------
# KEY BINDINGS
# -----------------------------------------------------------------------------
# Set prefix key to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload tmux config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Split panes using \ and - (current path)
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane resizing
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z     # Maximize pane


# Enable vi mode
set-window-option -g mode-keys vi

# Copy with "y" using wl-copy (Standard for Fedora Wayland)
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "wl-copy"

# Paste with Prefix + P
bind P paste-buffer

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# -----------------------------------------------------------------------------
# THEME: Everforest (Sharp)
# -----------------------------------------------------------------------------

# Everforest Hard Colors
# Bg: #2b3339, Fg: #d3c6aa, Green: #a7c080, Yellow: #dbbc7f, Blue: #7fbbb3, Red: #e67e80, Gray: #4a555b

set -g status-style "fg=#d3c6aa,bg=#2b3339"
set -g message-style "fg=#2b3339,bg=#a7c080"
set -g mode-style "fg=#2b3339,bg=#a7c080"

# Borders
set -g pane-border-style "fg=#4a555b"
set -g pane-active-border-style "fg=#a7c080"

##### STATUS LEFT #####
set -g status-left-length 100
set -g status-right-length 200
set -g status-left "#[fg=#2b3339,bg=#a7c080,bold] #S #[fg=#a7c080,bg=#2b3339,nobold]│ "

##### STATUS RIGHT #####
set -g status-right "#[fg=#4a555b,bg=#2b3339]│#[fg=#2b3339,bg=#a7c080]  󰍛 #{cpu_percentage} #[fg=#4a555b,bg=#2b3339]│#[fg=#2b3339,bg=#a7c080]  󰟜 #{ram_percentage} #[fg=#4a555b,bg=#2b3339]│#[fg=#2b3339,bg=#a7c080]  %d-%m-%Y #[fg=#4a555b,bg=#2b3339]│#[fg=#2b3339,bg=#a7c080] 󰥔 %I:%M %p "

# Window Status
set -g window-status-current-format "#[fg=#2b3339,bg=#a7c080,bold] #I:#W #[fg=#a7c080,bg=#2b3339,nobold]"
set -g window-status-format "#[fg=#d3c6aa,bg=#2b3339] #I:#W "

#--- PLUGINS ---#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu' 

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
run '~/.tmux/plugins/tpm/tpm'
